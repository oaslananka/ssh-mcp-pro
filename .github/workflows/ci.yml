name: CI

on:
  push:
    branches:
      - main
      - "chore/**"
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  dependency-review:
    name: Dependency Review
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          fail-on-severity: moderate
          allow-licenses: >-
            MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD,
            CC0-1.0, Unlicense

  quality:
    name: Quality Gates
    if: >-
      ${{
        github.event_name != 'pull_request' ||
        github.event.pull_request.draft == false
      }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.15.0
          package-manager-cache: false

      - name: Enable pnpm
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@11.0.9 --activate

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Quality gate parity
        run: pnpm run check:quality

  unit:
    name: Unit Tests (Node ${{ matrix.node_major }})
    if: >-
      ${{
        github.event_name != 'pull_request' ||
        github.event.pull_request.draft == false
      }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - node: 22.22.2
            node_major: 22
          - node: 24.15.0
            node_major: 24
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false

      - name: Enable pnpm
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@11.0.9 --activate

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Unit coverage
        run: pnpm run test:coverage

      - name: Upload JUnit results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: junit-node-${{ matrix.node }}
          path: test-results/**/*.xml
          if-no-files-found: warn

      - name: Upload coverage artifact
        if: ${{ !cancelled() && matrix.node == '24.15.0' }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore

  integration:
    name: SSH Integration
    if: >-
      ${{
        github.event_name != 'pull_request' ||
        github.event.pull_request.draft == false
      }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.15.0
          package-manager-cache: false

      - name: Enable pnpm
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@11.0.9 --activate

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Start SSH fixture
        run: pnpm run docker:ssh-fixture:up

      - name: Run integration tests
        run: pnpm run test:integration
        env:
          RUN_SSH_INTEGRATION: "1"
          TEST_SSH_HOST: localhost
          TEST_SSH_PORT: "2222"
          TEST_SSH_USER: testuser
          TEST_SSH_PASS: testpass

      - name: Stop SSH fixture
        if: ${{ !cancelled() }}
        run: pnpm run docker:ssh-fixture:down

      - name: Upload integration JUnit results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: junit-integration
          path: test-results/**/*.xml
          if-no-files-found: warn

  package:
    name: Build, SBOM, and Pack
    if: >-
      ${{
        github.repository == 'oaslananka/ssh-mcp-pro' &&
        (github.event_name != 'pull_request' ||
          github.event.pull_request.draft == false)
      }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs:
      - quality
      - unit
      - integration
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.15.0
          package-manager-cache: false

      - name: Enable pnpm
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@11.0.9 --activate

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Package parity
        run: pnpm run check:package

      - name: Generate CycloneDX SBOM and package hash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          pnpm run sbom
          PACKAGE_FILE="$(
            pnpm pack --pack-destination artifacts --json |
              node scripts/extract-pack-filename.mjs
          )"
          sha256sum "artifacts/$PACKAGE_FILE" > "artifacts/$PACKAGE_FILE.sha256"

      - name: Upload release verification artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: release-verification
          path: artifacts

  docker:
    name: Docker Smoke
    if: >-
      ${{
        github.repository == 'oaslananka/ssh-mcp-pro' &&
        (github.event_name != 'pull_request' ||
          github.event.pull_request.draft == false)
      }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs:
      - package
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Build production image
        run: docker build -t ssh-mcp-pro:ci .

      - name: Smoke CLI
        run: |
          docker run --rm ssh-mcp-pro:ci --version
          docker run --rm ssh-mcp-pro:ci --help
